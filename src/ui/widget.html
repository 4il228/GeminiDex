<button class="toggle-btn" id="toggle-btn">
  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
</button>
<div class="chat-wrapper" id="chat-wrapper">
  <div class="header">
    <div class="header-logo">G</div>
    <div>
      <div class="header-title">Gemini Agent</div>
      <div class="header-subtitle">AI Assistant</div>
    </div>
  </div>
  <div class="messages" id="messages">
    <div class="empty-state" id="empty-state">
      <div class="empty-icon">✦</div>
      <div class="empty-title">Hi there!</div>
      <div class="empty-text">Ask me anything about this page</div>
    </div>
  </div>
  <div class="input-area">
    <div class="input-wrapper">
      <textarea id="user-input" placeholder="Message Gemini..." rows="1"></textarea>
      <button class="send-btn" id="send-btn">
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
  </div>
</div>
